<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 첫 번째 웹사이트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .avatar { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 28px; color: #333; margin-bottom: 8px; }
    .subtitle { font-size: 16px; color: #764ba2; font-weight: 600; margin-bottom: 20px; }
    p { font-size: 15px; color: #666; line-height: 1.7; margin-bottom: 28px; }
    .badge {
      display: inline-block;
      background: #f0eeff;
      color: #764ba2;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      margin: 4px;
    }
    .footer { margin-top: 32px; font-size: 13px; color: #aaa; }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <h1>안녕하세요!</h1>
    <div class="subtitle">나의 첫 번째 웹사이트에 오신 걸 환영합니다</div>
    <p>AI 바이브코딩으로 만든 첫 번째 랜딩페이지입니다.<br>앞으로 멋진 웹 프로젝트들을 만들어 나갈 예정입니다.</p>
    <div>
      <span class="badge">🚀 HTML</span>
      <span class="badge">🎨 CSS</span>
      <span class="badge">⚡ GitHub Pages</span>
    </div>
    <div class="footer">© 2026 · chdani0406</div>
  </div>
</body>
</html>
